<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 1</title>
    <style>
        body {
            background-image:url(https://media.istockphoto.com/id/1494185112/vector/technology-black-circuit-diagram-concept.jpg?s=612x612&w=0&k=20&c=O2WJDSW6C7woZiW1aFiIma-uahp4tTmV534QyGERDNY=);
            background-size: cover;
            background-size: 150%, 100%;
            background-position: center;
            background-repeat: no-repeat;
            font-family:system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
        div {
            text-align: center; 
        }
        input {
            padding: 10px 25px; 
            border: 2px solid rgb(175, 162, 199); 
            border-radius: 5px; 
            text-align: center;
        }
    </style>
</head>
<body>
    <div style="background-color: white;"><br>
        <h1>Electricity Consumption Classifier</h1>
        <p>Enter the amount of electricity consumption with kilowatt per hour.</p>
        <p>Get more info about <a href="https://en.wikipedia.org/wiki/Electric_energy_consumption">electric energy consumption.</a></p>
        <div style="background-color:rgb(178, 202, 224); padding: 50px; border-radius: 50px; max-width: 400px; margin: auto;">
            <p>Input your Usage in kWh to classify your electricity consumption.</p>
            <form>
                <input type="text" id="input" placeholder="Input kWh usage"><br>
                <input type="button" onmouseover="classifyConsumption()" value="Check">
            </form>
            <b><div id="display1"></div></b>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
